# Exploration Tree
tree:
- id: Q1
  type: question
  title: 如何使多模态大模型具备物理世界推理与具身决策能力
  support_level: inferred
  description: Physical AI 系统需要感知、理解并在物理世界中执行复杂动作，当前通用 VLM 缺乏物理常识接地与具身决策能力，需要探索专项能力构建路径
  children:
  - id: P1
    type: pivot
    title: 从「通用 VLM 零样本应用」转向「物理 AI 专项本体论指导的 SFT+RL 后训练」
    support_level: inferred
    from: 直接使用已有通用视觉语言模型零样本推理或依靠 chain-of-thought 提示处理物理 AI 任务
    to: 定义物理常识（三大类 16 子类）与具身推理（二维本体论）的专项本体论，据此策展 SFT 数据与 RL 奖励，进行两阶段专项后训练
    trigger: 通用 VLM 在物理常识与具身推理基准上显著弱于专项训练模型，直觉物理任务上接近随机猜测水平
  - id: D1
    type: decision
    title: 训练范式选择：仅 RL vs. 两阶段 SFT 先建基础再 RL 提升
    support_level: explicit
    source_refs:
    - Sec 4
    - Sec 7.1
    - Sec 7.2
    choice: 采用两阶段训练：先进行 Physical AI SFT 建立领域基础能力，再进行 Physical AI RL 后训练进一步提升推理精度
    alternatives:
    - 仅使用 RL 端到端后训练，跳过 SFT 阶段
    - 仅使用 SFT，不加 RL 后训练
    children:
    - id: E1
      type: experiment
      title: Physical AI SFT 在物理常识与具身推理基准上的效果验证
      support_level: explicit
      source_refs:
      - Sec 7.1
      - Tab. 7
      - Tab. 8
      result: Physical AI SFT 相比基础 VLM 主干在物理常识基准和具身推理基准上均有显著提升，7B 和 56B 变体均大幅超越对应骨干模型
      children:
      - id: E2
        type: experiment
        title: Physical AI RL 后训练对物理常识与具身推理基准的进一步改进
        support_level: explicit
        source_refs:
        - Sec 7.2
        - Tab. 9
        result: RL 后训练在大多数基准分项上继续提升性能；但 RoboFail（手工策划困难样本集）表现停滞，归因于代表性训练数据不足
    - id: E3
      type: experiment
      title: 直觉物理任务（空间拼图、时间方向、物体恒存性）的 RL 训练效果实验
      support_level: explicit
      source_refs:
      - Sec 7.2.3
      - Tab. 10
      result: SFT 后直觉物理整体大幅提升；RL 进一步改善空间拼图与物体恒存性，但时间方向（Arrow of Time）仍是挑战
  - id: D2
    type: decision
    title: 56B 骨干架构选择：密集 Transformer vs. 混合 Mamba-MLP-Transformer
    support_level: explicit
    source_refs:
    - Sec 3.2
    choice: 为 Cosmos-Reason1-56B 选用混合 Mamba-MLP-Transformer 架构（Nemotron-H），以少量 Transformer
      层补偿 Mamba 在长序列细节捕捉上的不足
    alternatives:
    - 纯密集 Transformer（7B 所采用方案）
    - 纯 Mamba 架构（无 Transformer 层）
  - id: Q2
    type: question
    title: 如何为物理常识与具身推理任务设计规则可验证的 RL 奖励
    support_level: explicit
    source_refs:
    - Sec 5.2
    - Sec 7.2.1
    description: 物理常识与具身推理任务的回答通常是自由格式开放式文本，不能直接使用精确字符串匹配；需要探索可扩展的可验证奖励设计方案
    children:
    - id: DE1
      type: dead_end
      title: 直接使用自由格式回答作为 RL 奖励信号
      support_level: explicit
      source_refs:
      - Sec 5.2
      hypothesis: 物理常识与具身推理任务的自由格式开放式回答可直接用于设计规则可验证的 RL 奖励
      failure_mode: 自由格式回答难以进行精确规则验证，奖励分配复杂，不满足「可验证奖励」前提；无法像数学、编程任务那样精确定义正确答案
      lesson: 需将样本转化为单一正确答案的多选题（MCQ），方可使用简单字符串匹配实现规则可验证奖励
  - id: DE2
    type: dead_end
    title: 对直觉物理数据使用通用「压缩视觉为 caption 后送 R1 提取推理链」流程
    support_level: explicit
    source_refs:
    - Sec 5.1.3
    hypothesis: 将视频帧内容压缩为文本 caption 后送入 DeepSeek-R1 的通用推理链提取流程，可普遍适用于所有直觉物理子任务（包括时间方向与物体恒存性）
    failure_mode: 对「时间方向（AoT）」任务，通用流程导致 R1 提取的推理链质量次优；对「物体恒存性」任务，caption 压缩造成关键视觉信息丢失，无法提取有效推理链
    lesson: 不同直觉物理子任务需定制化数据策展策略：AoT 需在提示中明确注明播放方向，且由 VLM 直接提取推理链；物体恒存性需改用 Cosmos-Reason1-7B
      中间版本而非 R1 来提取推理链
