# Exploration Tree
tree:
- id: Q1
  type: question
  title: 如何使多模态 LLM 具备 Physical AI 推理能力？
  support_level: explicit
  source_refs:
  - Abstract
  - Sec. 1
  description: 物理 AI 系统需感知、理解并在物理世界中执行复杂动作。现有 LLM 和 VLM 尽管在数学、编程等领域表现出色，却缺乏物理常识与具身推理能力，无法将知识与真实世界的交互和动态建立有效连接。研究问题是：如何设计训练数据、训练流程和模型架构，使模型获得这些能力？
  children:
  - id: D1
    type: decision
    title: 采用「物理 AI SFT → 物理 AI RL」两阶段训练范式
    support_level: explicit
    source_refs:
    - Sec. 1
    - Sec. 4
    - Sec. 7.1
    choice: 先通过 SFT 在精心构建的物理常识与具身推理数据上建立基础能力，再通过基于可验证规则奖励的 RL 后训练进一步提升推理质量
    alternatives:
    - 纯 SFT 路线（无 RL 后训练阶段）
    - 直接对预训练模型做 RL（无 SFT 预热）
    - 端到端视觉-语言-动作（VLA）模型训练
    children:
    - id: E1
      type: experiment
      title: 物理常识 SFT 基准评估（Space/Time/Fundamental Physics）
      support_level: explicit
      source_refs:
      - Sec. 7.1.1
      - Tab. 7
      result: Cosmos-Reason1-56B 与 Cosmos-Reason1-7B 相比各自基础模型均有显著提升；56B 略优于 OpenAI
        o1；验证了物理常识 SFT 数据集质量对性能上界的决定性作用
    - id: E2
      type: experiment
      title: 具身推理 SFT 基准评估（多数据集跨具身类型）
      support_level: explicit
      source_refs:
      - Sec. 7.1.2
      - Tab. 8
      result: 7B 与 56B 相对各自基础模型均提升超过 10%，在 BridgeData V2、AV 等子集上提升尤为显著；物理 AI SFT 对具身推理的提升高度有效
    - id: D2
      type: decision
      title: RL 奖励设计：规则可验证的 MCQ 准确率奖励 + 格式奖励
      support_level: explicit
      source_refs:
      - Sec. 5.2
      - Sec. 7.2.1
      choice: 将推理 SFT 数据转换为单一正确答案的多选题，利用字符串匹配实现准确率奖励；辅以正则匹配 think/answer 标签的格式奖励
      alternatives:
      - 自由文本 LLM 评判奖励（Judge-based reward）
      - 过程奖励模型（Process Reward Model）
      - 人工标注奖励信号
      children:
      - id: E3
        type: experiment
        title: RL 后训练对物理常识与具身推理的整体提升
        support_level: explicit
        source_refs:
        - Sec. 7.2.2
        - Tab. 9
        result: RL 在大多数基准子集上进一步提升，整体平均准确率高于纯 SFT 版本；模型通过 RL 学会在问题模糊时拒绝所有选项，展现出保守合理的决策行为
      - id: DE1
        type: dead_end
        title: RL 未能有效提升 RoboFail 基准性能
        support_level: explicit
        source_refs:
        - Sec. 7.2.2
        hypothesis: 基于通用物理 AI RL 奖励信号的后训练可以提升所有具身推理子任务，包括难度较高的 RoboFail（覆盖复杂物理约束的动作可供性与任务完成验证）
        failure_mode: RoboFail 要求高度细致的感知与复杂物理约束推理，当前 RL 训练数据中缺乏此类代表性样本；错误模式包括对复杂可供性场景推理不足、感知细节不够敏锐、以及对分布外细粒度问题过度思考
        lesson: 仅依靠通用可验证奖励信号无法解决需要特定领域代表性训练样本的困难任务；突破 RoboFail 上限需要针对性地构建包含复杂物理约束场景的训练数据
    - id: E4
      type: experiment
      title: 直觉物理推理（箭头时间、空间拼图、物体永久性）SFT+RL 验证
      support_level: explicit
      source_refs:
      - Sec. 7.1.3
      - Sec. 7.2.3
      - Tab. 10
      result: SFT 后 7B 在三类任务上均大幅超越随机猜测基线；RL 进一步提升空间拼图与物体永久性；箭头时间在 RL 后仍具挑战，说明时序动态推理比空间推理更难通过当前
        RL 配方解决
    - id: P1
      type: pivot
      title: 物体永久性推理迹提取：从 DeepSeek-R1 改为 Cosmos-Reason1-7B 中间版本
      support_level: explicit
      source_refs:
      - Sec. 5.1.3
      from: 沿用物理常识和具身推理的标准流程：将视觉上下文压缩为文字描述，再送入 DeepSeek-R1 提取推理迹
      to: 直接从 Cosmos-Reason1-7B 的中间训练版本提取推理迹，绕过纯文本压缩步骤
      trigger: 物体永久性任务的核心挑战在于识别视频中物体消失的视觉证据，将视觉上下文压缩为文本后 DeepSeek-R1 无法生成有效的推理迹，导致
        SFT 监督信号质量不佳
  - id: D3
    type: decision
    title: RL 训练框架：全异步异构分离部署，而非主流协同框架
    support_level: explicit
    source_refs:
    - Sec. 4.2
    choice: 策略训练节点与 Actor rollout 节点异构分离部署，通过统一 Dispatcher 调度实现端到端异步并行；辅以训练网格管理逻辑和
      Dispatcher 冗余机制保障容错性
    alternatives:
    - 协同部署框架（colocated framework，如 OpenRLHF、HybridFlow），策略训练与 rollout 共享资源但存在同步开销
    children:
    - id: Q2
      type: question
      title: 异步分离框架如何提升训练效率与系统容错性？
      support_level: explicit
      source_refs:
      - Sec. 4.2
      description: 协同框架因同步开销导致资源利用率低，且节点故障需要代价高昂的重启恢复。异步分离框架通过 Dispatcher 调度解耦训练与生成，使整个流水线实现端到端异步；训练网格管理逻辑允许任意节点故障时无需重启即可继续当前训练步；Dispatcher
        冗余机制进一步提升整体鲁棒性；框架设计天然支持动态扩缩容。论文报告该框架相比协同框架带来约 160% 的训练效率提升
