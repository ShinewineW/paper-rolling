# Exploration Tree
tree:
- id: Q1
  type: question
  title: 如何将扩散模型引入端到端自动驾驶并同时满足实时性与多模式轨迹生成需求？
  support_level: explicit
  source_refs:
  - Abstract
  - Sec 1
  description: 标准扩散策略在机器人领域已被证明能建模多模式动作分布，但直接应用于自动驾驶面临两大障碍：大量去噪步骤导致推理速度无法满足实时要求，以及开放世界交通场景下随机高斯噪声引发的模式坍塌问题。
  children:
  - id: E1
    type: experiment
    title: 验证标准DDIM扩散策略的基础能力：将Transfuser改造为TransfuserDP
    support_level: explicit
    source_refs:
    - Sec 3.2
    - Table 2
    result: 规划质量略有提升，但需要20步去噪，FPS从60降至7，且不同随机噪声去噪后收敛至相似轨迹，出现严重模式坍塌
  - id: DE1
    type: dead_end
    title: 直接适配标准DDIM扩散策略（20步）用于驾驶轨迹生成
    support_level: explicit
    source_refs:
    - Sec 3.2
    hypothesis: 从随机高斯噪声出发经20步DDIM去噪可直接生成多样化多模式驾驶轨迹
    failure_mode: 交通场景的动态与开放世界特性导致不同噪声收敛至相似轨迹（模式坍塌），且20步去噪使规划模块运行时间增加约650倍，无法满足实时驾驶需求
    lesson: 驾驶场景与机器人操控场景本质不同，需要将先验驾驶模式嵌入扩散过程，仅靠随机高斯噪声无法有效覆盖驾驶动作空间
  - id: Q2
    type: question
    title: 如何通过引入先验驾驶知识同时解决模式坍塌与过多去噪步骤问题？
    support_level: explicit
    source_refs:
    - Sec 3.3
    description: 模式坍塌源于从随机高斯噪声出发缺乏结构性先验约束，过多去噪步骤源于从完全随机状态出发需要较长恢复路径。嵌入先验驾驶模式可同时解决这两个问题。
    children:
    - id: D1
      type: decision
      title: 采用K-Means聚类构建多模式锚点，以锚定高斯分布替代随机高斯分布作为去噪起点
      support_level: explicit
      source_refs:
      - Sec 3.3
      choice: 对训练集轨迹进行K-Means聚类得到20个先验锚点，通过截断至前50/1000步的噪声调度仅在锚点附近添加少量高斯噪声，形成锚定高斯分布；训练模型从该分布去噪至目标驾驶动作分布
      alternatives:
      - 使用基于当前行驶状态外推的单一轨迹作为先验（Table 8消融实验验证效果较差，无法覆盖转弯和避障等挑战性场景）
      - 沿用大规模固定词汇表离散化方法（如VADv2的8192锚点，计算代价高且在词汇表边界场景失效）
    - id: E2
      type: experiment
      title: TransfuserTD：验证截断扩散策略相比标准扩散策略的提升效果
      support_level: explicit
      source_refs:
      - Sec 4.4
      - Table 2
      result: 去噪步骤从20步降至2步，规划质量和模式多样性均显著提升，证明锚定高斯分布提供了合理起点；但此时仍使用UNet解码器，参数量偏大且与场景交互受限
    - id: DE2
      type: dead_end
      title: 以当前行驶状态外推的单条轨迹作为唯一先验起点
      support_level: explicit
      source_refs:
      - Appendix B
      - Table 8
      hypothesis: 基于当前车辆状态外推的单条轨迹可作为合理先验，引导扩散过程覆盖潜在动作空间
      failure_mode: 单一外推轨迹无法覆盖多样化驾驶动作空间，在需要避障和转向的挑战性场景中显著失效，规划性能大幅下降
      lesson: 多模式K-Means锚点的分布表达能力远优于单一状态外推先验，多样化聚类中心能有效预设驾驶行为的多种模式，是覆盖潜在动作空间的关键
  - id: Q3
    type: question
    title: 如何设计高效的扩散解码器取代UNet并增强与条件场景上下文的层次化交互？
    support_level: explicit
    source_refs:
    - Sec 3.4
    description: TransfuserTD中的UNet解码器参数量大且仅通过自车查询与场景交互，缺乏对BEV特征和感知模块输出（智能体/地图查询）的充分利用，需要专为驾驶任务设计的轻量高效解码器。
    children:
    - id: D2
      type: decision
      title: 设计基于Transformer的级联扩散解码器：稀疏可变形注意力结合级联精炼机制
      support_level: explicit
      source_refs:
      - Sec 3.4
      choice: 采用稀疏可变形交叉注意力与BEV/PV特征交互，再与感知模块的智能体/地图查询进行交叉注意力，配合Timestep Modulation层和FFN；堆叠2个级联层并在不同去噪步骤间共享参数以降低推理时延
      alternatives:
      - 保留UNet解码器架构（参数量约102M，与场景上下文交互方式受限，且在步骤间不共享参数）
    - id: E3
      type: experiment
      title: 消融实验：逐步验证扩散解码器各设计组件的独立贡献
      support_level: explicit
      source_refs:
      - Sec 4.5
      - Table 3
      result: 空间交叉注意力是规划质量的关键组件；智能体/地图注意力提供额外增益；级联机制进一步提升性能；完整解码器以约60M参数显著超越102M参数的UNet基线
    - id: E4
      type: experiment
      title: 消融实验：不同推理去噪步数对规划质量的影响
      support_level: explicit
      source_refs:
      - Sec 4.5
      - Table 4
      result: 仅1步去噪已可达到较好规划质量，2步进一步改善，3步性能基本持平2步，验证了锚定高斯分布提供合理初始起点的假设
    - id: E5
      type: experiment
      title: 消融实验：级联解码器阶段数对性能与参数量的影响
      support_level: explicit
      source_refs:
      - Sec 4.5
      - Table 5
      result: 增加级联阶段可提升规划质量，但在4阶段时性能趋于饱和且参数量明显增加，2阶段为效率与质量的最佳平衡点
    - id: P1
      type: pivot
      title: 从大词汇表离散采样范式转向少锚点引导的截断生成式扩散策略
      support_level: explicit
      source_refs:
      - Sec 1
      - Sec 2
      from: 以VADv2为代表的方法：使用大规模固定锚点词汇表（如8192个）离散化动作空间，再基于预测得分从词汇表中采样轨迹
      to: DiffusionDrive：仅用20个K-Means聚类锚点引导截断扩散过程，借助生成模型的连续分布表达能力覆盖动作空间，无词汇表边界限制
      trigger: 大词汇表离散化在词汇表外场景中根本性失效，且大量锚点带来显著计算负担；扩散模型的生成能力可以更少锚点实现更好的多模式动作空间覆盖
