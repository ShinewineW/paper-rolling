del\u00ef\u00bc\u0088\u00e7\u00bc\u00ba interactive loop \u00e5\u0092\u008c explicit memory\u00ef\u00bc\u0089\u00e3\u0080\u0082\n   - O3: \u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e6\u0098\u00af\u00e7\u0093\u00b6\u00e9\u00a2\u0088\u00ef\u00bc\u0088\u00e9\u009a\u0090\u00e5\u00bc\u008f\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e5\u0099\u00a8\u00e4\u00b8\u00a2\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087/\u00e5\u00b9\u00bb\u00e8\u00a7\u0089\u00ef\u00bc\u008c\u00e5\u008f\u008d\u00e5\u00ba\u0094\u00e5\u00bc\u008f\u00e5\u00be\u00aa\u00e7\u008e\u00af\u00e7\u00bc\u00ba\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00ef\u00bc\u0089\u00e3\u0080\u0082\n   - G1:\u00e8\u00b7\u00af\u00e5\u00be\u0084\u00e3\u0080\u0082\n   - G2: \u00e9\u009d\u0099\u00e6\u0080\u0081\u00e7\u00bc\u00ba\u00e6\u008e\u00a7\u00e5\u0088\u00b6\u00e6\u008e\u00a5\u00e5\u008f\u00a3\u00ef\u00bc\u0089\u00e3\u0080\u0082\n   - G3: \u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e9\u009a\u00be\u00e4\u00bf\u009d\u00e6\u008c\u0081\u00e9\u0095\u00bf\u00e6\u009c\u009f\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00ef\u00bc\u0088\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e7\u00ad\u0096\u00e7\u0095\u00a5\u00e7\u00bc\u00ba\u00e5\u00a4\u00b1\u00ef\u00bc\u008c\u00e9\u009a\u0090\u00e5\u00bc\u008f\u00e9\u0081\u0097\u00e5\u00bf\u0098\u00ef\u00bc\u008c\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e9\u009a\u00be\u00e5\u00a4\u0084\u00e7\u0090\u0086\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00ef\u00bc\u0089\u00e3\u0080\u0082\n   - Insight: true world model \u00e6\u0098\u00af generative heart + interactive loop + memory system \u00e7\u009a\u0084\u00e7\u00bb\u00bc\u00e5\u0090\u0088\u00ef\u00bc\u008c\u00e4\u00ba\u00a7\u00e7\u0094\u009f persistence, agency, emergence\u00e3\u0080\u0082\n   - Assumptions: mask-reconstruct-generalize \u00e6\u0098\u00af\u00e8\u00b5\u00b7\u00e7\u0082\u00b9\u00ef\u00bc\u009b\u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00e6\u0098\u00af\u00e5\u0089\u008d\u00e7\u00bd\u00ae\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e9\u009c\u0080\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00ef\u00bc\u009bpersistence/agency/emergence\n\n\u00e4\u00bb\u00bb\u00e5\u008a\u00a1\u00ef\u00bc\u009a\u00e6\u008a\u008a observations -> gaps -> insight \u00e4\u00b8\u00b2\u00e6\u0088\u0090\n\u00e6\u00a0\u0087\u00e9\u00a2\u0098\u00ef\u00bc\u009a`## \u00e9\u0097\u00ae\u00e9\u00a2\u0098\u00e8\u0083\u008c\u00e6\u0099\u00af\u00e4\u00b8\u008e\u00e5\u008a\u00a8\u00e6\u009c\u00ba` (\u00e5\u008f\u00af\u00e4\u00bb\u00a5\u00e5\u008a\u00a0 emoji\u00ef\u00bc\u008c\u00e5\u00a6\u0082 `## \u00f0\u009f\u008e\u00af \u00e9\u0097\u00ae\u00e9\u00a2\u0098\u00e8\u0083\u008c\u00e6\u0099\u00af\u00e4\u00b8\u008e\u00e5\u008a\u00a8\u00e6\u009c\u00ba`)\n\n\u00e6\u0080\u009d\u00e8\u0080\u0083\u00e7\u00bb\u0093\u00e6\u009e\u0084\u00ef\u00bc\u009a\n1. **\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e5\u0089\u008d\u00e7\u00bd\u00ae**\u00ef\u00bc\u009aTrue World Model \u00e7\u009a\u0084\u00e6\u00a0\u00b8\u00e5\u00bf\u0083\u00e7\u0097\u009b\u00e7\u0082\u00b9\u00e4\u00b8\u008d\u00e5\u009c\u00a8\u00e4\u00ba\u008e\u00e2\u0080\u009c\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e5\u00be\u0097\u00e4\u00b8\u008d\u00e5\u00a4\u009f\u00e9\u0080\u00bc\u00e7\u009c\u009f\u00e2\u0080\u009d\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e5\u009c\u00a8\u00e4\u00ba\u008e\u00e2\u0080\u009c\u00e7\u00bc\u00ba\u00e4\u00b9\u008f\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e9\u0097\u00ad\u00e7\u008e\u00af\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e2\u0080\u009d\u00ef\u00bc\u008c\u00e5\u00af\u00bc\u00e8\u0087\u00b4\u00e7\u008e\u00b0\u00e6\u009c\u0089\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e5\u008f\u00aa\u00e8\u0083\u00bd\u00e5\u0081\u009a\u00e2\u0080\u009c\u00e4\u00b8\u0080\u00e6\u00ac\u00a1\u00e6\u0080\u00a7\u00e8\u00a7\u0086\u00e9\u00a2\u0091\u00e6\u0092\u00ad\u00e6\u0094\u00be\u00e5\u0099\u00a8\u00e2\u0080\u009d\u00ef\u00bc\u008c\u00e6\u0097\u00a0\u00e6\u00b3\u0095\u00e6\u0088\u0090\u00e4\u00b8\u00ba2. **\u00e8\u00a7\u0082\u00e5\u00af\u009f\u00e4\u00b8\u008e\u00e7\u008e\u00b0\u00e8\u00b1\u00a1 (Observations)**\u00ef\u00bc\u009a\n   - \u00e6\u00a6\u0082\u00e5\u00bf\u00b5\u00e6\u00b3\u009b\u00e6\u00bb\u00a5 (O1)\u00ef\u00bc\u009aWorld model \u00e8\u00a2\u00ab\u00e6\u00bb\u00a5\u00e7\u0094\u00a8\u00e4\u00ba\u008e\u00e7\u008e\u00af\u00e5\u00a2\u0083\u00e6\u00a8\u00a1\u00e6\u008b\u009f\u00e5\u0099\u00a8\u00e3\u0080\u0081\u00e8\u00a7\u0084\u00e5\u0088\u0092\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e7\u0094\u009a\u00e8\u0087\u00b3\u00e7\u00a4\u00be\u00e4\u00bc\u009a\u00e6\u00a8\u00a1\u00e6\u008b\u009f LLM\u00e3\u0080\u0082\n   - \u00e7\u0094\u009f\u00e6\u0088\u0090\u00e5\u0099\u00a8\u00e7\u009a\u0084\u00e5\u00b1\u0080\u00e9\u0099\u0090 (O2, O3)\u00ef\u00bc\u009a\u00e5\u00bc\u00ba\u00e5\u00a4\u00a7\u00e7\u009a\u0084 Unified Model \u00e5\u008d\u00b3\u00e4\u00bd\u00bf\u00e6\u009c\u0089 powerful generative heart\u00ef\u00bc\u008c\u00e4\u00b9\u009f\u00e7\u00bc\u00ba\u00e5\u00b0\u0091 dedicated interactive loop \u00e5\u0092\u008c explicit memory system\u00e3\u0080\u0082\u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e6\u0098\u00af\u00e8\u0087\u00b4\u00e5\u0091\u00bd\u00e7\u0093\u00b6\u00e9\u00a2\u0088\u00ef\u00bc\u0088implicit frame-by-frame generators \u00e5\u00ae\u00b9\u00e6\u0098\u0093 losing context \u00e5\u0092\u008c hallucinating objects\u00ef\u00bc\u0089\u00e3\u0080\u0082\n3. **\u00e7\u008e\u00b0\u00e6\u009c\u0089\u00e6\u0096\u00b9\u00e6\u00b3\u0095\u00e7\u009a\u0084\u00e5\u008d\u00a1\u00e7\u0082\u00b9 (Gaps)**\u00ef\u00bc\u009a\n   - \u00e7\u00bc\u00ba1)\u00e3\u0080\u0082\n   - \u00e9\u009d\u0099\u00e6\u0080\u0081\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e6\u0097\u00a0\u00e6\u00b3\u0095\u00e4\u00ba\u00a4\u00e4\u00ba\u0092 (G2)\u00ef\u00bc\u009aInteractive Generative Models \u00e5\u00b0\u009d\u00e8\u00af\u0095\u00e4\u00bd\u0086\u00e7\u00bc\u00ba\u00e4\u00b9\u008f\u00e5\u00ae\u009e\u00e6\u0097\u00b6 action-perception \u00e9\u0097\u00ad\u00e7\u008e\u00af\u00e3\u0080\u0082\n   - \u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e5\u00b4\u00a9\u00e6\u00ba\u0083 (G3)\u00ef\u00bc\u009aFramePack\u00e3\u0080\u0081Context-as-Memory \u00e7\u00ad\u0089\u00e6\u0096\u00b9\u00e6\u00b3\u0095\u00e5\u00b0\u009d\u00e8\u00af\u0095\u00e7\u00bc\u0093\u00e8\u00a7\u00a3\u00ef\u00bc\u008c\u00e4\u00bd\u0086\u00e9\u009a\u0090\u00e5\u00bc\u008f\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e7\u00b4\u00af\u00e7\u00a7\u00af\u00e8\u00af\u00af\u00e5\u00b7\u00ae\u00ef\u00bc\u008c\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e7\u00a9\u00ba\u00e9\u0097\u00b4\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e9\u009a\u00be\u00e5\u00a4\u0084\u00e7\u0090\u0086\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e3\u0080\u0082\n4. **Insight)**\u00ef\u00bc\u009a\n   - \u00e4\u00b8\u008d\u00e6\u0098\u00af\u00e5\u00a0\u0086\u00e7\u00a0\u008c\u00e6\u00a8\u00a1\u00e5\u009d\u0097\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e6\u0098\u00af\u00e5\u00b0\u0086 generative heart\u00e3\u0080\u0081interactive loop \u00e5\u0092\u008c memory system \u00e8\u009e\u008d\u00e5\u0090\u0088\u00ef\u00bc\u008c\u00e5\u00ae\u009e\u00e7\u008e\u00b0 persistence\u00e3\u0080\u0081agency \u00e4\u00b8\u008e emergence\u00e3\u0080\u0082\n5. **\u00e5\u009b\u00be\u00e8\u00a1\u00a8**\u00ef\u00bc\u009a\u00e7\u0094\u00bb\u00e4\u00b8\u0080\u00e4\u00b8\u00aa Mermaid \u00e5\u009b\u00be\u00ef\u00bc\u008c\u00e5\u00b1\u0095\u00e7\u00a4\u00ba\u00e4\u00bb\u008e\u00e2\u0080\u009c\u00e9\u009d\u0099\u00e6\u0080\u0081\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e2\u0080\u009d\u00e5\u0088\u00b0\u00e2\u0080\u009c\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e2\u0080\u009d\u00e5\u0086\u008d\u00e5\u0088\u00b0\u00e2\u0080\u009cTrue World Model\u00e2\u0080\u009d\u00e7\u009a\u0084\u00e6\u00bc\u0094\u00e5\u008c\u0096\u00e4\u00b8\u008e True World Model \u00e7\u009a\u0084\u00e4\u00b8\u0089\u00e5\u00 \u0082\n  - `### \u00e6\u00bc\u0094\u00e5\u008c\u0096\u00e9\u0098\u00b6\u00e6\u00a2\u00af\u00e4\u00b8\u008e\u00e7\u00bb\u0088\u00e6\u009e\u0081\u00e5\u00b1\u009e\u00e6\u0080\u00a7` (\u00e6\u0095\u00b4\u00e5\u0090\u0088 Mask-based, Unified, Interactive, Memory \u00e4\u00bb\u00a5\u00e5\u008f\u008a Persistence, Agency, Emergence)\n    - \u00e7\u0094\u00a8\u00e8\u00a1\u00a8\u00e6\u00a0\u00bc\u00e5\u00af\u00b9\u00e6\u00af\u0094\u00e6\u00bc\u0094\u00e5\u008c\u0096\u00e9\u0098\u00b6\u00e6\u00ae\u00b5\u00e3\u0080\u0082\n    - \u00e8\u00ae\u00b2\u00e8\u00a7\u00a3\u00e7\u00bb\u0088\u00e6\u009e\u0081\u00e5\u00b1\u009e\u00e6\u0080\u00a7\u00e3\u0080\u0082\n  - `### \u00e5\u0089\u008d\u00e6\u00b2\u00bf\u00e6\u008c\u0091\u00e6\u0088\u0098 (The Three Problems)`\n    - Coherence, Compression, Alignment\u00e3\u0080\u0082\n\n**\u00e8\u008d\u0089\u00e7\u00a8\u00bf\u00e4\u00b8\u008e\u00e5\u00ad\u0097\u00e6\u0095\u00b0\u00e6\u008e\u00a7\u00e5\u0088\u00b6**\u00ef\u00bc\u009a\n\u00e5\u00ad\u0097\u00e6\u0095\u00b0\u00e8\u00a6\u0081\u00e6\u00b1\u0082 350 - 800 \u00e5\u00ad\u0097\u00e3\u0080\u0082\u00e9\u009c\u0080\u00e8\u00a6\u0081\u00e9\u009d\u009e\u00e5\u00b8\u00b8\u00e7\u00b2\u00be\u00e7\u0082\u00bc\u00ef\u00bc\u008c\u00e5\u0090\u008c\u00e6\u0097\u00b6\u00e6\u00bb\u00a1\u00e8\u00b6\u00b3\u00e6\u0089\u0080\u00e6\u009c\u0089\u00e7\u00ba\u00a6\u00e6\u009d\u009f\u00e3\u0080\u0082\n\n*\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e5\u0089\u008d\u00e7\u00bd\u00ae\u00e6\u00ae\u00b5\u00e8\u0090\u00bd*\u00ef\u00bc\u009a\nTrue World Model \u00e5\u00b9\u00b6\u00e9\u009d\u009e\u00e5\u008d\u0095\u00e4\u00b8\u0080\u00e7\u009a\u0084\u00e5\u00b7\u00a8\u00e5\u00a4\u00a7\u00e7\u00a5\u009e\u00e7\u00bb\u008f\u00e7\u00bd\u0091\u00e7\u00bb\u009c\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e6\u0098\u00af\u00e7\u0094\u00b1 Generative Heart\u00e3\u0080\u0081Interactive Loop \u00e5\u0092\u008c Memory System \u00e4\u00b8\u0089\u00e5\u00a4\u00a7\u00e5\u00ad\u0090\u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e5\u0092\u00ac\u00e5\u009 087\u00ba\u00e4\u00ba\u0086\u00e4\u00b8\u0089\u00e5\u00a4\u00a7\u00e6\u00b7\u00b1\u00e6\u00b0\u00b4\u00e5\u008c\u00ba\u00e9\u0097\u00ae\u00e9\u00a2\u0098\u00ef\u00bc\u008c\u00e6\u009c\u00aa\u00e8\u00bf\u0087\u00e5\u00ba\u00a6\u00e5\u00ae\u00a3\u00e7\u00a7\u00b0\u00e5\u00b7\u00b2\u00e8\u00a7\u00a3\u00e5\u0086\u00b3\u00ef\u00bc\u009a\n1. **Coherence Problem**\u00ef\u00bc\u009a\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e8\u0087\u00aa\u00e5\u00b7\u00b1\u00e4\u00b9\u00a6\u00e5\u0086\u0099\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e6\u0097\u00b6\u00ef\u00bc\u008c\u00e5\u00a6\u0082\u00e4\u00bd\u0095\u00e8\u00af\u0084\u00e4\u00bc\u00b0\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00ef\u00bc\u009f\u00e4\u00bc\u00a0\u00e7\u00bb\u009f fidelity \u00e6\u008c\u0087\u00e6\u00a0\u0087\u00e5\u009c\u00a8\u00e6\u00ad\u00a4\u00e5\u00a4\u00b1\u00e6\u0095\u0088\u00e3\u0080\u0082\n2. **Compression Problem**\u00ef\u00bc\u009a\u00e6\u0097\u00a0\u00e9\u0099\u0090\u00e5\u00a2\u009e\u00e9\u0095\u00bf\u00e7\u009a\u0084\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e4\u00bc\u009a\u00e5\u00af\u00bc\u00e8\u0087\u00b4\u00e8\u00ae\u00a1\u00e7\u00ae\u0097\u00e5\u00b4\u00a9\u00e6\u00ba\u0083\u00e6\u008a\u00bd\u00e8\u00b1\u00a1\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e9\u009d\u009e\u00e7\u00ae\u0080\u00e5\u008d\u0095\u00e5\u00a0\u0086\u00e7\u00a0\u008c\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e3\u0080\u0082\n3. **Alignment Problem**\u00ef\u00bc\u009a\u00e5\u00a4\u009a\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e7\u00a4\u00be\u00e4\u00bc\u009a\u00e5\u009f\u00ba\u00e5\u00ba\u0095\u00e6\u0097\u00b6\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e5\u00af\u00b9\u00e9\u00bd\u0090\u00e5\u00a4\u008d\u00e6\u009d\u0082\u00e7\u009a\u0084\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e3\u0080\u0082\u00e2\u0080\u009d (170\u00e5\u00ad\u0097)\n\n\u00e6\u008a\u0098\u00e5\u008f\u00a0\u00e5\u009d\u0097\u00ef\u00bc\u009a\n\u00e2\u0080\u009c<details>\n<summary><\u00ef\u00bc\u009a\u00e4\u00b8\u00ba\u00e4\u00bb\u0080\u00e4\u00b9\u0088\u00e9\u0095\u00bf\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e4\u00b8\u008d\u00e7\u00ad\u0089\u00e4\u00ba\u008e\u00e5\u008f\u00af\u00e9\u009d\u00a0\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00ef\u00bc\u009f</strong></summary>\n\u00e8\u00ae\u00ba\u00e6\u0096\u0087\u00e5\u00bc\u00ba\u00e8\u00b0\u0083\u00ef\u00bc\u008c\u00e5\u008d\u0095\u00e7\u00ba\u00af\u00e6\u0089\u00a9\u00e5\u00a4\u00a7 Context Window \u00e6\u0097\u00a0\u00e6\u00b3\u0095\u00e8\u0087\u00aa\u00e5\u008a\u00a8\u00e6\u009e\u0084\u00e6\u0088\u0090 Persistence\u00e3\u0080\u0082\u00e7\u009c\u009f\u00e6\u00ad\u00a3\u00e7\u009a\u0084 Memory System \u00e6\u00a3\u0080\u00e7\u00b4\u00a2\u00e3\u0080\u0081\u00e6\u009b\u00b4\u00e6\u0096\u00b0\u00e5\u0092\u008c\u00e9\u0081\u0097\u00e5\u00bf\u0098\u00e7\u009a\u0084\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e7\u00ad\u0096\u00e7\u0095\u00a5\u00e3\u0080\u0082\u00e7\u00bc\u00ba\u00e4\u00b9\u008f\u00e8\u00bf\u0099\u00e7\u00a7\u008d\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00e8\u00ae\u00be\u00e8\u00ae\u00a1\u00ef\u00bc\u008c\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e5\u009c\u00a8\u00e9\u0095\u00bf\u00e5\u00ba\u008f\u00e5\u0088\u0097\u00e4\u00b8\u00ad\u00ef\u00bc\u0088Drift\u00ef\u00bc\u0089\u00ef\u00bc\u008c\u00e5\u00af\u00bc\u00e8\u0087\u00b4\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e9\u0080\u00bb\u00e8\u00be\u0091\u00e5\u00b4\u00a9\u00e5\u00a1\u008c\u00e3\u0080\u0082\n</details>\u00e2\u0080\u009d (110\u00e5\u00ad\u0097)\n\n\u00e6\u0080\u00bb\u00e5\u00ad\u0097\u00e6\u0095\u00b0\u00ef\u00bc\u009a165 + 80 + 260 + 160 + 170 + 110 = 945\u00e4\u00ba\u0086 800 \u00e5\u00ad\u0097\u00e9\u0099\u0090\u00e5\u0088\u00b6\u00e5\u008e\u008b\u00e7\u00bc\u00a9\u00e3\u0080\u0082\n\n\u00e9\u0087\u008d\u00e6\u0096\u00b0\u00e5\u008e\u008b\u00e7\u00bc\u00a9\u00ef\u00bc\u009a\n\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e6\u00ae\u00b5\u00ef\u00bc\u009a\nTrue World Model \u00e5\u00b9\u00b6\u00e9\u009d\u009e\u00e5\u008d\u0095\u00e4\u00b8\u0080\u00e7\u00a5\u009e\u00e7\u00bb\u008f\u00e7\u00bd\u0091\u00e7\u00bb\u009c\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e6\u0098\u00af\u00e7\u0094\u00b1 Generative Heart\u00e3\u0080\u0081Interactive Loop \u00e5\u0092\u008c Memory System \u00e5\u0092\u00ac\u00e5\u0090\u0088\u00e7\u009a\u0084\u00e7\u0094\u009f\u00e6\u0080\u0081\u00e5\u00bc\u0095\u00e6\u0093\u008e\u00e3\u0080\u0082\u00e8\u00ae\u00ba\u00e6\u0096\u0087\u00e4\u00b8\u00bb\u00e5\u00bc\u00a0\u00ef\u00bc\u009a\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e8\u0083\u00bd\u00e5\u008a\u009b\u00e5\u008f\u00aa\u00e8\u0083\u00bd\u00e5\u0088\u00b6\u00e9\u0080\u00a0\u00e8\u00a2\u00ab\u00e5\u008a\u00a8\u00e5\u00bd\u00b1\u00e7\u0089\u0087\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e4\u00b8\u008e\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00ef\u00bc\u008c\u00e6\u0089\u008d\u00e8\u0083\u00bd\u00e5\u00ad\u0095\u00e8\u0082\u00b2 Persistence \u00e4\u00b8\u008e Emergence \u00e7\u009a\u0084\u00e6\u0095\u00b0\u00e5\u00ad\u0097\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e3\u0080\u0082(125\u00e5\u00ad\u0097)\n\n\u00e5\u009b\u00be\u00ef\u00bc\u009a(\u00e4\u00bf\u009d\u00e7\u0095\u0099\u00ef\u00bc\u008c\u00e5\u00ad\u0097\u00e6\u0095\u00b0\u00e8\u00ae\u00a1\u00e7\u00ae\u0097\u00e9\u0080\u009a\u00e5\u00b8\u00b8\u00e4\u00b8\u008d\u00e5\u0090\u00ab\u00e4\u00bb\u00a3\u00e7\u00a0\u0081\u00e5\u009d\u0097\u00ef\u00bc\u008c\u00e4\u00bd\u008650\u00e5\u00ad\u0097)\n\n### \u00e6\u00a0\u00b8\u00e5\u00bf\u0083\u00e5\u00ad\u0090\u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e6\u008b\u0086\u00e8\u00a7\u00a3\n- **Generative Heart ($G$)**\u00ef\u00bc\u009a\u00e7\u0089\u00a9\u00e7\u0090\u0086\u00e4\u00b8\u008e\u00e6\u00b8\u00b2\u00e6\u009f\u0093\u00e5\u00bc\u0095\u00e6\u0093\u008e\u00e3\u0080\u0082\u00e9\u0080\u009a\u00e8\u00bf\u0087 $$p_\\theta(z_{t+1}|z_t,a_t)$$ \u00e9\u00a2\u0084\u00e6\u00b5\u008b\u00e6\u009c\u00aa\u00e6\u009d\u00a5\u00e3\u0080\u0082\u00e7\u009b\u00b4\u00e8\u00a7\u0089\u00e4\u00b8\u008a\u00e5\u0083\u008f**\u00e7\u0094\u00b5\u00e5\u00bd\u00b1\u00e7\u0089\u0087\u00e5\u009c\u00ba**\u00ef\u00bc\u008c\u00e8\u0083\u00bd\u00e6\u00a0\u00b9\u00e6\u008d\u00ae\u00e5\u008a\u00a8\u00e4\u00bd\u009c\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e7\u0094\u00bb\u00e9\u009d\u00a2\u00ef\u00bc\u008c\u00e4\u00bd\u0086\u00e6\u0097\u00a0\u00e5\u00af\u00bc\u00e6\u00bc\u0094\u00e5\u008f\u00aa\u00e8\u0083\u00bd\u00e7\u009b\u00b2\u00e7\u009b\u00ae\u00e6\u0092\u00ad\u00e6\u0094\u00be\u00e3\u0080\u0082\n- **Interactive Loop ($F, C$)**\u00ef\u00bc\u009a\u00e7\u00a5\u009e\u00e7\u00bb\u008f\u00e4\u00b8\u008e\u00e8\u0082\u008c\u00e8\u0082\u0089\u00e3\u0080\u0082\u00e5\u0090\u00ab\u00e6\u008e\u00a8\u00e6\u0096\u00ad\u00e6\u00bb\u00a4\u00e6\u00b3\u00a2\u00e5\u0099\u00a8\u00e4\u00b8\u008e\u00e6\u008e\u00a7\u00e5\u0088\u00b6\u00e7\u00ad\u0096\u00e7\u0095\u00a5\u00e3\u0080\u0082\u00e7\u009b\u00b4\u00e8\u00a7\u0089\u00e4\u00b8\u008a\u00e5\u0083\u008f**\u00e8\u0087\u00aa\u00e5\u008a\u00a8\u00e9\u00a9\u00be\u00e9\u00a9\u00b6**\u00ef\u00bc\u008c\u00e6\u008e\u00a5\u00e6\u0094\u00b6\u00e8\u00a7\u0082\u00e6\u00b5\u008b\u00e5\u00b9\u00b6\u00e5\u00ae\u009e\u00e6\u0097\u00b6\u00e5\u0086\u00b3\u00e7\u00ad\u0096\u00ef\u00bc\u008c\u00e5\u00bd\u00a2\u00e6\u0088\u0090\u00e9\u0097\u00ad\u00e5\u0090\u0088\u00e5\u00be\u00aa\u00e7\u008e\u00af\u00ef\u00bc\u008c\u00e8\u00b5\u008b\u00e4\u00ba\u0088\u00e7\u00b3\u00bb\u00e7\u00bb\u009f Agency\u00e3\u0080\u0082\n- **Memory System ($M$)**\u00ef\u00bc\u009a\u00e6\u00b5\u00b7\u00e9\u00a9\u00ac\u00e4\u00bd\u0093\u00e3\u0080\u0082\u00e9\u0080\u009a\u00e8\u00bf\u0087 $$h_t = f_\\psi(h_{t-1}, z_t, a_{t-1})$$ \u00e7\u00bb\u00b4\u00e6\u008a\u00a4\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e3\u0080\u0082\u00e7\u009b\u00b4\u00e8\u00a7\u0089\u00e4\u00b8\u008a\u00e5\u0083\u008f**\u00e6\u00b8\u00b8\u00e6\u0088\u008f\u00e5\u00ad\u0098\u00e6\u00a1\u00a3**\u00ef\u00bc\u008c\u00e7\u00a1\u00ae\u00e4\u00bf\u009d\u00e6\u0098\u00a8\u00e5\u00a4\u00a9\u00e7\u00a0\u008d\u00e5\u0080\u0092\u00e7\u009a\u0084\u00e6\u00a0\u0091\u00e4\u00bb\u008a\u00e5\u00a4\u00a9\u00e4\u00b8\u008d\u00e9\u0087\u008d\u00e7\u0094\u009f\u00ef\u00bc\u008c\u00e6\u0098\u00af Persistence \u00e7\u009a\u0084\u00e5\u009f\u00ba\u00e7\u009f\u00b3\u00e3\u0080\u0082(230\u00e5\u00ad\u0097)\n\n### \u00e6\u00bc\u0094\u00e5\u008c\u0096\u00e8\u00b7\u00af\u00e5\u00be\u0084\u00e4\u00b8\u008e\u00e7\u00bb\u0088\u00e6\u009e\u0081\u00e5\u00b1\u009e\u00e6\u0080\u00a7\n\u00e6\u00bc\u0094\u00e8\u00bf\u009b\u00e5\u0088\u0086\u00e5\u009b\u009b\u00e9\u0098\u00b6\u00e6\u00ae\u00b5\u00ef\u00bc\u009aMask-based Models\u00ef\u00bc\u0088\u00e6\u00a8\u00a1\u00e6\u0080\u0081\u00e5\u0089\u00b2\u00e8\u00a3\u0082\u00ef\u00bc\u0089\u00e3\u0080\u0081Unified Models\u00ef\u00bc\u0088\u00e7\u00bc\u00ba\u00e5\u00ae\u009e\u00e6\u0097\u00b6\u00e9\u0097\u00ad\u00e7\u008e\u00af\u00ef\u00bc\u0089\u00e3\u0080\u0081Interactive Generative Models\u00ef\u00bc\u0088\u00e6\u009c\u00aa\u00e8\u00a7\u00a3\u00e5\u0086\u00b3\u00e9\u0095\u00bf\u00e6\u0097\u00b6\u00e7\u00a8\u008b\u00e6\u00bc\u0082\u00e7\u00a7\u00bb\u00ef\u00bc\u0089\u00ef\u00bc\u008c\u00e6\u009c\u0080\u00e7\u00bb\u0088\u00e8\u00b5\u00b0\u00e5\u0090\u0091 Memory and Cons\u00e5\u008d\u00b3\u00e4\u00ba\u00a7\u00e7\u0094\u009f **Emergence**\u00ef\u00bc\u009a\u00e5\u00ae\u008f\u00e8\u00a7\u0082\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e7\u0094\u00b1\u00e5\u00ba\u0095\u00e5\u00b1\u0082\u00e8\u00a7\u0084\u00e5\u0088\u0099\u00e4\u00b8\u008e\u00e5\u00a4\u009a\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e4\u00ba\u0092\u00e5\u008a\u00a8\u00e8\u0087\u00aa\u00e7\u0084\u00b6\u00e8\u00a1\u008d\u00e7\u0094\u009f\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e9\u009d\u009e\u00e8\u0084\u009a\u00e6\u009c\u00ac\u00e3\u0080\u0082(140\u00e5\u00ad\u0097)\n\n### \u00e5\u0089\u008d\u00e6\u00b2\u00bf\u00e6\u008c\u0091\u00e6\u0088\u0098\n\u00e8\u00ae\u00ba\u00e6\u0096\u0087\u00e8\u00af\u009a\u00e5\u00ae\u009e\u00e6\u008c\u0087\u00e5\u0087\u00ba\u00e4\u00b8\u0089\u00e5\u00a4\u00a7\u00e6\u00b7\u00b1\u00e6\u00b0\u00b4\u00e5\u008c\u00ba\u00ef\u00bc\u008c\u00e6\u009c\u00aa\u00e8\u00bf\u0087\u00e5\u00ba\u00a6\u00e5\u00ae\u00a3\u00e7\u00a7\u00b0\u00e5\u00b7\u00b2\u00e8\u00a7\u00a3\u00e5\u0086\u00b3\u00ef\u00bc\u009a\n1. **Coherence Problem**\u00ef\u00bc\u009a\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e8\u0087\u00aa\u00e4\u00b9\u00a6\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e6\u0097\u00b6\u00ef\u00bc\u008c\u00e4\u00bc\u00a0\u00e7\u00bb\u009f fidelity \u00e6\u008c\u0087\u00e6\u00a0\u0087\u00e5\u00a4\u00b1\u00e6\u0095\u0088\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e3\u0080\u0082\n2. **Compression Problem**\u00ef\u00bc\u009a\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e5\u00a2\u009e\u00e9\u0095\u00bf\u00e8\u0087\u00b4\u00e8\u00ae\u00a1\u00e7\u00ae\u0097\u00e5\u00b4\u00a9\u00e6\u00ba\u0083\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e6\u008a\u00bd\u00e8\u00b1\u00a1\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e9\u009d\u009e\u00e6\u00ad\u00bb\u00e7\u00a3\u0095\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e7\u00aa\u0097\u00e5\u008f\u00a3\u00e3\u0080\u0082\n3. **Alignment Problem**\u00ef\u00bc\u009a\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e5\u009f\u00ba\u00e5\u00ba\u0095\u00e6\u0097\u00b6\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e5\u00af\u00b9\u00e9\u00bd\u0090\u00e5\u00a4\u008d\u00e6\u009d\u0082\u00e7\u009a\u0084\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e3\u0080\u0082(150\u00e5\u00ad\u0097)\n\n\u00e6\u008a\u0098\u00e5\u008f\u00a0\u00e5\u009d\u0097\u00ef\u00bc\u009a\n<details>\n<summary><strong>\u00e9\u0095\u00bf\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e4\u00b8\u00ba\u00e4\u00bd\u0095\u00e4\u00b8\u008d\u00e7\u00ad\u0089\u00e4\u00ba\u008e\u00e5\u008f\u00af\u00e9\u009d\u00a0\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00ef\u00bc\u009f</strong></summary>\n\u00e8\u00ae\u00ba\u00e6\u0096\u0087\u00e5\u00bc\u00ba\u00e8\u00b0\u0083\u00ef\u00bc\u008c\u00e6\u0089\u00a9\u00e5\u00a4\u00a7 Context Window \u00e6\u0097\u00a0\u00e6\u00b3\u0095\u00e8\u0087\u00aa\u00e5\u008a\u00a8\u00e6\u0 ut\u00e3\u0080\u0082\n9. **\u00e7\u00a1\u00ac\u00e7\u00ba\u00a6\u00e6\u009d\u009f**\u00ef\u00bc\u009a\u00e4\u00b8\u00ad\u00e6\u0096\u0087\u00e3\u0080\u0081\u00e6\u0081\u00b0\u00e5\u00bd\u0093\u00ef\u00bc\u009b\u00e5\u00bf\u00a0\u00e5\u00ae\u009e\u00e4\u00ba\u008b\u00e5\u00ae\u009e\u00e6\u00ba\u0090\u00ef\u00bc\u009b\u00e6\u008e\u00a5\u00e5\u009c\u00b0\u00e6\u0097\u00a0\u00e7\u00b2\u00be\u00e7\u00a1\u00ae\u00e6\u0080\u00a7\u00e8\u0083\u00bd\u00e6\u0095\u00b0\u00e5\u00ad\u0097\u00ef\u00bc\u0089\u00ef\u00bc\u009b-800\u00e5\u00ad\u0097\u00ef\u00bc\u009b\u00e5\u008f\u00aa\u00e8\u00be\u0093\u00e5\u0087\u00ba\u00e6\u009c\u00ac\u00e8\u008a\u0082\u00e6\u00ad\u00a3\u00e6\u0096\u0087\u00ef\u00bc\u008c\u00e4\u00bb\u00a5\u00e2\u0080\u009c## \u00e6\u0096\u00b9\u00e6\u00b3\u0095\u00e4\u00b8\u008e\u00e6\u0095\u00b4\u00e4\u00bd\u0093\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00e2\u0080\u009d\u00e5\u00bc\u0080\u00e5\u00a4\u00b4\u00ef\u00bc\u0088\u00e5\u008f\u00af\u00e5\u008a\u00a0emoji\u00ef\u00bc\u0089\u00e3\u0080\u0082\n\n\u00e5\u0088\u0086\u00e6\u009e\u0090\u00e4\u00ba\u008b\u00e5\u00ae\u009e\u00e6\u00ba\u0090\u00ef\u00bc\u009a\n- **Architecture**: mask, infill, generalize -> Unified Models (shared backbone, same paradigm) -> Interactive Generative Models (streamed inputs/user actions, internal state) -> Memory and Consistency (externalized memory, architectural persistence, consistency policies) -> True World Models (Generative Heart, Interactive Loop, Memory System -> Persistence, Agency, Emergence).\n  \u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e5\u00b1\u0082\u00e9\u009d\u00a2\u00ef\u00bc\u009aGenerative Heart (\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e7\u008a\u00b6\u00e6\u0080\u0081\u00e4\u00b8\u008e\u00e6\u0084\u009f\u00e7\u009f\u00a5\u00e7\u00bb\u0093\u00e6\u009e\u009c), Inference Filter (\u00e4\u00bb\u008e\u00e8\u00a7\u0082\u00e6\u00b5\u008b\u00e4\u00b8\u008e\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e6\u008e\u00a8\u00e6\u0096\u00ad latent belief state), Control Model (\u00e9\u0080\u0089\u00e6\u008b\u00a9\u00e5\u008a\u00a8\u00e4\u00bd\u009c\u00e5\u00b9\u00b6\u00e4\u00bc\u00b0\u00e8\u00ae\u00a1\u00e4\u00bb\u00b7\u00e5\u0080\u00bc), Memory Update Model (\u00e6\u008a\u008a\u00e5\u00bd\u0093\u00e5\u0089\u008d\u00e7\u008a\u00b6\u00e6\u0080\u0081\u00e5\u0092\u008c- **Heuristics**:\n  - H1: \u00e7\u00aa\u0084\u00e8\u00b7\u00af\u00e7\u00bb\u0084\u00e7\u00bb\u0087 (Mask-based -> Unified -> Interactive -> Memory -> True World Models).\n  - H2: Unified model \u00e6\u008e\u0092\u00e9\u0099\u00a4 glue models\u00ef\u00bc\u008c\u00e4\u00bf\u009d\u00e7\u0095\u0099 shared backbone & same paradigm.\n  - H3\u00e6\u009d\u00a1\u00e4\u00bb\u00b6\u00e5\u008c\u0096\u00e5\u009c\u00a8 streamed inputs/user actions\u00ef\u00bc\u008c\u00e7\u00bb\u00b4\u00e6\u008a\u00a4 internal state.\n  - H4: \u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e9\u009d\u00a0 explicit policies over memory (what to write/retrieve/update/forget)\u00ef\u00bc\u008c\u00e4\u00b8\u008d\u00e8\u0083\u00bd\u00e5\u008f\u00aa\u00e9\u009d\u00a0 longer context.\n  - H5: True World Models \u00e5\u0088\u00a4\u00e6\u008d\u00ae\u00e6\u0098\u00af Generative Heart, Interactive Loop, Memory System \u00e5\u008d\u008f\u00e5\u0090\u008c\u00e4\u00ba\u00a7\u00e7\u0094\u009f Persistence, Agency, Emergence.\n- **Algorithm**:\n  \u00e6\u0097\u00a0\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e6\u009c\u009f\u00e7\u00bb\u0084\u00e4\u00bb\u00b6\u00ef\u00bc\u009a\n  Generative Heart $\\mathcal{G}$: Dynamics $p_\\theta(z_{t+1}|z_t, a_t)$, Observation $p_\\theta(o_t|z_t)$, Reward $p_\\theta(r_t|z_t, a_t)$, Discount/Termination $p_\\theta(\\gamma_t|z_t, a_t)$.\n  Inference Filter $\\mathcal{F}$: State Inference $q_\\phi(z_t|h_{t-1}, o_t)$.\n  Control Model $\\mathcal{C}$: Policy $\\pi_\\eta(a_t|z_t, h_t)$, Value $v_\\omega(z_t, h_t)$.\n  Memory Update Model $\\mathcal{M}$: Memory Update $h_t = f_\\psi(h_{t-1}, z_t, a_{t-1})$.\n\n\u00e6\u009e\u0084\u00e5\u00bb\u00ba\u00e6\u0096\u0087\u00e7\u00ab\u00a0\u00e7\u00bb\u0093\u00e6\u009e\u0084\u00ef\u00bc\u009a\n1. **H2 \u00e6\u00a0\u0087\u00e9\u00a2\u0098**\u00ef\u00bc\u009a## \u00f0\u009f\u008f\u0097\u00ef\u00b8\u008f \u00e6\u0096\u00b9\u00e6\u00b3\u0095\u00e4\u00b8\u008e\u00e6\u0095\u00b4\u00e4\u00bd\u0093\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00ef\u00bc\u009a\u00e4\u00bb\u008e\u00e6\u008b\u00bc\u00e5\u0087\u0091\u00e6\u00a8\u00a1\u00e5\u009d\u0097\u00e5\u0088\u00b0\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e2\u0080\u009c\u00e7\u009c\u009f\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e2\u0080\u009d\n2. **\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e5\u0089\u008d\u00e7\u00bd\u00ae**\u00ef\u00bc\u009aTrue World Models \u00e5\u00b9\u00b6\u00e9\u009d\u009e\u00e7\u00ae\u0080\u00e5\u008d\u0095\u00e5\u00a0\u0086\u00e7\u00a0\u008c\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e3\u0080\u0081\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e4\u00b8\u008e\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e6\u00a8\u00a1\u00e5\u009d\u0097\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e6\u0098\u00af\u00e9\u0080\u009a\u00e8\u00bf\u0087 Generative Heart\u00e3\u0080\u0081Interactive Loop \u00e4\u00b8\u008e Memory System \u00e7\u009a\u0084\u00e6\u00b7\u00b1\u00e5\u00ba\u00a6\u00e8\u0080\u00a6\u00e5\u0090\u0088\u00ef\u00bc\u008c\u00e5\u009c\u00a8\u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e8\u00bf\u0090\u00e8\u00a1\u008c\u00e4\u00b8\u00ad\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e5\u0087\u00ba Persistence\u00ef\u00bc\u0088\u00ef\u00bc\u0088\u00e8\u0087\u00aa\u00e4\u00b8\u00bb\u00e6\u0080\u00a7\u00ef\u00bc\u0089\u00e4\u00b8\u008e Emergence\u00ef\u00bc\u0088\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e8\u0083\u00bd\u00e5\u008a\u009b\u00ef\u00bc\u0089\u00e3\u0080\u0082\u00e8\u00ae\u00ba\u00e6\u0096\u0087\u00e6\u0091\u0092\u00e5\u00bc\u0083\u00e4\u00ba\u0086\u00e2\u0080\u009c\u00e6\u0096\u0087\u00e6\u009c\u00ac\u00e8\u0087\u00aa\u00e5\u009b\u009e\u00e5\u00bd\u0092+\u00e5\u009b\u00be\u00e5\u0083\u008f\u00e6\u0089\u00a9\u00e6\u0095\u00a3\u00e2\u0080\u009d\u00e7\u009a\u0084\u00e8\u0083\u00b6\u00e6\u00b0\u00b4\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00ef\u00bc\u0088glue models\u00ef\u00bc\u0089\u00ef\u00bc\u008c\u00e5\u009d\u009a\u00e6\u008c\u0081 shared backbone \u00e4\u00b8\u008e same paradigm \u00e7\u009a\u0084\u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e5\u00ba\u0095\u00e5\u00ba\u00a7\u00e3\u0080\u0082\n3. **Pipeline \u00e8\u00a7\u00a3\u00e6\u009e\u0090**\u00ef\u00bc\u009a\n   - \u00e6\u0095\u00b0\u00e6\u008d\u00ae\u00e4\u00b8\u008estreamed inputs \u00e6\u0088\u0096 user actions \u00e9\u00a9\u00b1\u00e5\u008a\u00a8\u00e3\u0080\u0082\n   - \u00e5\u0090\u0084\u00e6\u00a8\u00a1\u00e5\u009d\u0097\u00e5\u0081\u009a\u00e4\u00bb\u0080\u00e4\u00b9\u0088\u00ef\u00bc\u009a\n     - Generative Heart ($\\mathcal{G}$)\u00ef\u00bc\u009a\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e7\u008a\u00b6\u00e6\u0080\u0081\u00ef\u00bc\u0088Dynamics\u00ef\u00bc\u0089\u00e3\u0080\u0081\u00e6\u0084\u009f\u00e7\u009f\u00a5\u00e7\u00bb\u0093\u00e6\u009e\u009c\u00ef\u00bc\u0088Observation\u00ef\u00bc\u0089\u00e5\u008f\u008a\u00e5\u00a5\u0096\u00e5\u008a\u00b1/\u00e7\u00bb\u0088\u00e6\u00ad\u00a2\u00e4\u00bf\u00a1\u00e5\u008f\u00b7\u00e3\u0080\u0082\n     - Inference Filter ($\\mathcal{F}$)\u00ef\u00bc\u009a\u00e7\u00bb\u0093\u00e5\u0090\u0088\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e4\u00b8\u008e\u00e8\u00a7\u0082\u00e6\u00b5\u008b\u00e6\u008e\u00a8\u00e6\u0096\u00ad latent belief state\u00e3\u0080\u0082\n     - Control Model ($\\mathcal{C}$)\u00ef\u00bc\u009a\u00e5\u009f\u00ba\u00e4\u00ba\u008e\u00e7\u008a\u00b6\u00e6\u0080\u0081\u00e4\u00b8\u008e\u00e5\u008e\u0086\u00e5\u008f\u00b2\u00e9\u0080\u0089\u00e6\u008b\u00a9\u00e5\u008a\u00a8\u00e4\u00bd\u009c\u00ef\u00bc\u0088Policy\u00ef\u00bc\u0089\u00e5\u00b9\u00b6\u00e4\u00bc\u00b0\u00e8\u00ae\u00a1\u00e4\u00bb\u00b7\u00e5\u0080\u00bc\u00ef\u00bc\u0088Value\u00ef\u00bc\u0089\u00e3\u0080\u0082\n     - Memory Update Model ($\\mathcal{M}$) b9id snake_case\u00ef\u00bc\u008c\u00e6\u00a0\u0087\u00e7\u00ad\u00be3-6\u00e8\u00af\u008d\u00ef\u00bc\u008c\u00e8\u00be\u00b9\u00e6\u00a0\u0087\u00e7\u00ad\u00be1-4\u00e8\u00af\u008d\u00e3\u0080\u0082\u00e5\u00a4\u008d\u00e6\u009d\u0082\u00e5\u00ba\u00a6\u00e5\u0088\u0086\u00e7\u00ba\u00a7\u00e3\u0080\u0082\n5. **\u00e8\u00a1\u00a8\u00e6\u00a0\u00bc vs \u00e5\u008f\u0099\u00e8\u00bf\u00b0**\u00ef\u00bc\u009a\u00e7\u00bb\u0093\u00e6\u009e\u0084\u00e5\u008c\u0096\u00e5\u00af\u00b9\u00e6\u00af\u0094\u00e7\u0094\u00a8\u00e8\u00a1\u00a8\u00e3\u0080\u0082\n6. **\u00e6\u00b7\u00b1\u00e5\u00ba\u00a6\u00e8\u0097\u008f\u00e8\u00bf\u009b\u00e6\u008a\u0098\u00e5\u008f\u00a0\u00e5\u009d\u0097**\u00ef\u00bc\u009a\u00e5\u0086\u0097\u00e9\u0095\u00bf\u00e7\u00bb\u0086\u00e8\u008a\u0082\u00e7\u0094\u00a8 `<details>` \u00e6\u008a\u0098\u00e5\u008f\u00a0\u00e3\u0080\u0082\n7. **\u00e7\u00a1\u00ac\u00e7\u00ba\u00a6\u00e6\u009d\u009f**\u00ef\u00bc\u009a\u00e4\u00b8\u00ad\u00e6\u0096\u0087\u00e6\u00af\u0094\u00e5\u0096\u00bb\u00e6\u0081\u00b0\u00e5\u00bd\u0093\u00e3\u0080\u0082\u00e5\u008f\u00aa\u00e7\u0094\u00a8\u00e7\u00bb\u0099\u00ef\u00bc\u008c\u00e4\u00b8\u008d\u00e7\u00bc\u0096\u00e9\u0080\u00a0\u00e3\u0080\u0082\u00e4\u00b8\u008d\u00e5\u0086\u0099\u00e7\u00b2\u00be\u00e7\u00a1\u00ae350-800\u00e5\u00ad\u0097\u00e3\u0080\u0082\u00e5\u008f\u00aa\u00e8\u00be\u0093\u00e5\u0087\u00ba\u00e6\u009c\u00ac\u00e8\u008a\u0082\u00e6\u00ad\u00a3\u00e6\u0096\u0087\u00ef\u00bc\u008c\u00e4\u00bb\u00a5 `## \u00e7\u00a0\u0094\u00e7\u00a9\u00b6\u00e6\u008e\u00a2\u00e7\u00b4\u00a2\u00e5\u008e\u0086\u00e7\u00a8\u008b` \u00e5\u00bc\u0080\u00e5\u00a4\u00b4\u00e3\u0080\u0082\n\n\u00e5\u0088\u0086\u00e6\u009e\u0090\u00e7\u00bb\u0099\u00e5\u00ae\u009a\u00e7\u009a\u0084\u00e4\u00ba\u008b\u00e5\u00ae\u009e\u00e6\u00ba\u0090\u00ef\u00bc\u0088trace/exploration_tree.yaml\u00ef\u00bc\u0089\u00ef\u00bc\u009a\n- Q1: \u00e6\u0080\u008e\u00e6\u00a0\u00b7\u00e4\u00bb\u008e\u00e9\u0081\u00ae\u00e8\u0094\u00bd\u00e5\u00bb\u00ba\u00e6\u00a8\u00a1\u00e8\u00b5\u00b0\u00e5\u0090\u0091 true world model (\u00e4\u00b8\u00bb\u00e9\u0097\u00ae\u00e9\u00a2\u0098)\n- Q2: \u00e9\u0081\u00ae\u00e8\u0094\u00bd\u00e8\u008c\u0083\u00e5\u00bc\u008f\u00e8\u0083\u00bd\u00e5\u0090\u00a6\u00e4\u00bd\u009c\u00e4\u00b8\u00ba\u00e8\u00b7\u00a8\u00e6\u00a8\u00a1\u00e6\u0080\u0081\u00e9\u00a2\u0084\u00e8\u00ae\u00ad\u00e7\u00bb\u0083\u00e5\u009f\u00ba\u00e7\u00a1\u0080 (Stage I) -> E1: \u00e8\u00b7\u00a8\u00e6\u00a8\u00a1\u00e6\u0080\u0081\u00e9\u0081\u00ae\u00e8\u0094\u00bd\u00e5\u00bb\u00ba\u00e6\u00a8\u00a1\u00e8\u00b7\u00af\u00e7\u00ba\u00bf\u00e8\u00af\u0081\u00e6\u008d\u00ae\n- D1: \u00e9\u0080\u0089\u00e6\u008b\u00a9\u00e7\u00aa\u0084\u00e8\u00b7\u00af (\u00e8\u0081\u009a\u00e7\u0084\u00a6 generative heart, interactive loop, memory system) -> Q3: true world model \u00e9\u009c\u0080\u00e8\u00a6\u0081 E2: \u00e4\u00b8\u0089\u00e5\u00ad\u0090\u00e7\u00b3\u00bb\u00e7\u00bb\u009f\u00e5\u00bd\u00a2\u00e5\u00bc\u008f\u00e5\u008c\u0096\u00e5\u0088\u0086\u00e6\u009e\u0090\n- D2: \u00e6\u008a\u008a unified model \u00e5\u00ae\u009a\u00e4\u00b9\u0089\u00e4\u00b8\u00ba\u00e8\u008c\u0083\u00e5\u00bc\u008f (Stage II) -> E3: \u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e4\u00bb\u00a3\u00e8\u00a1\u00a8\u00e8\u00b7\u00af\u00e7\u00ba\u00bf\u00e6\u00af\u0094\u00e8\u00be\u0083\n- DE1: \u00e5\u008f\u00aa\u00e9\u009d\u00a0\u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00e4\u00b8\u008d\u00e8\u0083\u00bd\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e4\u00b8\u0096\u00e7\u0095\u008c (failure: \u00e7\u00bc\u00ba\u00e4\u00b9\u008f continuous real-time closed-loop interaction) -> P1: \u00e4\u00bb\u008e\u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e8\u00bd\u00ac\u00e5\u0090\u0091\u00e9\u0097\u00ad\u00e7\u008e\u00af\u00e4\u00ba\u00a4\u00e4\u00ba\u0092 (Stage III)\n- E4: \u00e8\u00af\u00ad\u00e8\u00a8\u0080\u00e3\u0080\u0081\u00e8\u00a7\u0086\u00e9\u00a2\u0091\u00e4\u00b8\u008e\u00e5\u009c\u00ba\u00e6\u0099\u00af\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e8\u008c\u0083\u00e5\u00bc\u008f\u00e6\u00b1\u0087\u00e6\u0080\u00bb\n- DE2: \u00e5\u00ae\u009e\u00e6\u0097\u00b6\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e4\u00bb\u008d\u00e4\u00b8\u008d\u00e8\u0083\u00bd\u00e4\u00bf\u009d\u00e8\u00af\u0081: implicit frame-by-frame \u00e5\u00ae\u00b9\u00e6\u0098\u0093 losing context, \u00e6\u0098\u00be\u00e5\u00bc\u008f3D\u00e9\u009a\u00be\u00e5\u00a4\u0084\u00e7\u0090\u0086 dynamic) -> P2: \u00e4\u00bb\u008e\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e8\u00bd\u00ac\u00e5\u0090\u0091\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e4\u00b8\u008e\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7 (Stage IV)\n- Q4: \u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e5\u00ba\u0094\u00e9\u0094\u009a\u00e5\u00ae\u009a\u00e5\u009c\u00a8\u00e5\u0093\u00aa\u00e9\u0087\u008c\u00e5\u00b9\u00b6\u00e5\u00a6\u0082\u00e4\u00bd\u0095\u00e6\u0089\u00a9\u00e5\u00b1\u0095 -> E5: \u00e5\u00a4\u0096\u00e9\u0083\u00a8\u00e6\u0080\u00a7\u00e5\u0092\u008c\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e7\u00ad\u0096\u00e7\u0095\u00a5\u00e6\u00af\u0094\u00e8\u00be\u0083\n- D3: \u00e6\u008a\u008a\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e8\u00a7\u0086\u00e4\u00b8\u00ba\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e6\u00b2\u00bb\u00e7\u0090\u0086\u00e8\u0080\u008c\u00e9\u009d\u009e\u00e5\u008d\u0095\u00e7\u00ba\u00af\u00e9\u0095\u00bf\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087 -> DE3: \u00e5\u008f\u00aa\u00e6\u0089\u00a9\u00e5\u00a4\u00a7\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e7\u00aa\u0097\u00e5\u008f\u00a3\u00e4\u00b8\u008d\u00e8\u00b6\u00b3\u00e4\u00bb\u00a5\u00e6\u008e\u00a7\u00e5\u0088\u00b6\u00e6\u00bc\u0082\u00e7\u00a7\u00bb (failure: longer context alone is insufficient)\n- P3: \u00e4\u00bb\u008e\u00e7\u00bb\u0084\u00e4\u00bb\u00b6\u00e9\u009b\u0086\u00e6\u0088\u0090\u00e8\u00bd\u00ac\u00e5\u0090\u0091\u00e8\u0087\u00aa\u00e7\u00bb\u00b4\u00e6\u008c\u0081\u00e4\u00b8\u0096\u00e7\u0095\u008c (Stage V) -> Q5: true world model \u00e7\u009a\u0084\u00e5\u0089\u008d\u00e6\u00b2\u00bf\u00e9\u009a\u00be\u00e9\u00a2\u0098 (Coherence, Compression, Alignment) -> E6: \u00e6\u008a\u008a world model \u00e4\u00bd\u009c\u00e4\u00b8\u00ba\u00e7\u00a7\u0091\u00e5\u00ad\u00a6\u00e4\u00bb\u00aa\u00e5\u0099\u00a8\u00e7\u009a\u0084\u00e7\u0094\u00a8\u00e9\u0080\u0094\u00e6\u008e\u00a8\u00e6\u00bc\u0094\n\n\u00e5\u008f\u0099\u00e4\u00ba\u008b\u00e4\u00b8\u00bb\u00e7\u00ba\u00bf\u00ef\u00bc\u009a\n\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e5\u0089\u008d\u00e7\u00bd\u00ae\u00ef\u00bc\u009a\u00e6\u009e\u0084\u00e5\u00bb\u00ba True World Model \u00e5\u00b9\u00b6\u00e9\u009d\u009e\u00e4\u00b8\u0080\u00e8\u00b9\u00b4\u00e8\u0080\u008c\u00e5\u00b0\u00b1\u00e7\u009a\u0084\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00e5\u00a0\u0086\u00e5\u008f\u00a0\u00ef\u00bc\u008c\u00e8\u0080\u008c\u00e6\u0098\u00af\u00e4\u00b8\u0080\u00e6\u009d\u00a1\u00e5\u008e\u0086\u00e7\u00bb\u008f\u00e5\u009b\u009b\u00e6\u00ac\u00a1\u00e2\u0080\u009c\u00e7\u00a2\u00b0\u00e5\u00a3\u0081\u00e4\u00b8\u008e\u00e8\u00bd\u00ac\u00e5\u0090\u0091\u00e2\u0080\u009d\u00e7\u009a\u0084\u00e7\u00aa\u0084\u00e8\u00b7\u00af\u00e2\u0080\u0094\u00e2\u0080\u0094\u00e4\u00bb\u008e\u00e9\u009d\u0099\u00e6\u0080\u0081\u00e7\u009a\u0084\u00e9\u0081\u00ae\u00e8\u0094\u00bd\u00e9\u00a2\u0084\u00e8\u00ae\u00ad\u00e7\u00bb\u0083\u00ef\u00bc\u008c\u00e5\u0088\u00b0\u00e7\u00bb\u009f\u00e4\u00b8\u0080\u00e6\u009e\u00b6\u00e6\u009e\u0084\u00ef\u00bc\u008c\u00e5\u0086\u008d\u00e5\u0088\u00b0\u00e5\u00ae\u009e\u00e6\u0097\u00b6\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00ef\u00bc\u008c\u00e6\u009c\u0080\u00e7\u00bb\u0088\u00e8\u0090\u00bd\u00e8\u0084\u009a\u00e4\u00ba\u008e\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e6\u00b2\u00bb\u00e7\u0090\u0086\u00e4\u00b8\u008e\u00e8\u0087\u00aa\u00e7\u00bb\u00b4\u00e6\u008c\u0081\u00e7\u00b3\u00bb\u00e7\u00bb\u stency \u00e6\u009c\u00aa\u00e8\u00a7\u00a3\u00e5\u0086\u00b3\u00ef\u00bc\u009bimplicit frame-by-frame generators \u00e6\u0098\u0093 losing context \u00e5\u0092\u008c hallucinating objects\u00e3\u0080\u0082\n   - explicit 3D approaches \u00e4\u00be\u009d\u00e8\u00b5\u0096 explicit spatial modeling\u00ef\u00bc\u008c\u00e7\u00a9\u00ba\u00e9\u0097\u00b4\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e5\u00bc\u00ba\u00ef\u00bc\u008c\u00e4\u00bd\u0086 struggle with dynamic elements \u00e5\u0092\u008c long-term object states\u00e3\u0080\u0082\n   - mask-based persistent memory \u00e6\u008e\u00a2\u00e7\u00b4\u00a2\u00e4\u00b8\u008d\u00e8\u00b6\u00b3\u00ef\u00bc\u008cStage IV \u00e9\u0087\u0087\u00e5\u008f\u0096 architecture-agnostic view\u00ef\u00bc\u008c\u00e7\u00bc\u00ba mask-specific mechanism\u00e3\u0080\u0082\n   - true world model \u00e9\u009d\u00a2\u00e4\u00b8\u00b4 Coherence Problem\u00e3\u0080\u0081Compression Problem\u00e3\u0080\u0081Alignment Problem\u00ef\u00bc\u0088self-generating reality\u00e5\u009b\u00a0\u00e6\u009e\u009c\u00e3\u0080\u0081\u00e5\u008f\u0099\u00e4\u00ba\u008b\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e9\u009a\u00be\u00e8\u00af\u0084\u00e4\u00bb\u00b7\u00ef\u00bc\u0089\u00e3\u0080\u0082\n   - ever-growing history \u00e5\u00af\u00bc\u00e8\u0087\u00b4 computational collapse\u00ef\u00bc\u009b\u00e9\u009c\u0080 causally sufficient state abstractions\u00ef\u00bc\u008c\u00e4\u00bd\u0086 long-horizon dynamics \u00e5\u008f\u00af\u00e8\u0083\u00bd computationally irreducible\u00e3\u0080\u0082\n   - alignment \u00e5\u009c\u00a8 multi-agent society \u00e4\u00b8\u00ad\u00e6\u009b\u00b4\u00e9\u009a\u00be\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e5\u0090\u008c\u00e6\u0097\u00b6\u00e5\u00af\u00b9\u00e9\u00bd\u0090 substrate \u00e4\u00b8\u008e agents interaction \u00e4\u00ba\u00a7\u00e7\u0094\u009f\u00e7\u009a\u0084 emergent dynamics\u00e3\u0080\u0082\n8. **\u00e7\u00a1\u00ac\u00e7\u00ba\u00a6\u00e6\u009d\u009f**\u00ef\u00bc\u009a\u00e4\u00b8\u00ad\u00e6\u0096\u0087\u00e3\u0080\u0081\u00e6\u00af\u0094\u00e5\u0096\u00bb\u00ef\u00bc\u009b\u00e5\u008f\u00aa\u00e7\u0094\u00a8\u00e7\u00bb\u0099\u00e5\u00ae\u009a\u00e4\u00ba\u008b\u00e5\u00ae\u009e\u00ef\u00bc\u009b\u00e4\u00b8\u008d\u00e5\u0086\u0099\u00e7\u00b2\u00be\u00e7\u00a1\u00ae\u00e6\u0080\u00a7\u00e8\u0083\u00bd\u00e6\u0095\u00b0\u00e5\u00ad\u00970-800\u00e5\u00ad\u0097\u00ef\u00bc\u009b\u00e5\u008f\u00aa\u00e8\u00be\u0093\u00e5\u0087\u00ba\u00e6\u009c\u00ac\u00e8\u008a\u0082\u00e6\u00ad\u00a3\u00e6\u0096\u0087\u00ef\u00bc\u008c\u00e4\u00bb\u00a5 `## \u00e5\u00b1\u0080\u00e9\u0099\u0090\u00e4\u00b8\u008e\u00e9\u0080\u0082\u00e7\u0094\u00a8\u00e8\u00be\u00b9\u00e7\u0095\u008c` \u00e5\u00bc\u0080\u00e5\u00a4\u00b4\u00e3\u0080\u0082\n\n\u00e6\u0080\u009d\u00e8\u0080\u0083\u00e7\u00bb\u0093\u00e6\u009e\u0084\u00ef\u00bc\u009a\n- **\u00e6\u00a0\u0087\u00e9\u00a2\u0098**\u00ef\u00bc\u009a## \u00f0\u009f\u009a\u00a7 \u00e5\u00b1\u0080\u00e9\u0099\u0090\u00e4\u00b8\u008e\u00e9\u0080\u0082\u00e7\u0094\u00a8\u00e8\u00be\u00b9\u00e7\u0095\u008c\n- **\u00e7\u00bb\u0093\u00e8\u00ae\u00ba\u00e5\u0089\u008d\u00e7\u00bd\u00ae**\u00ef\u00bc\u009a\u00e6\u009c\u00ac\u00e6\u0096\u0087\u00e4\u00bd\u009c\u00e4\u00b8\u00ba\u00e8\u00b7\u00af\u00e7\u00ba\u00bf\u00e5\u009b\u00be\u00e5\u00bc\u008f\u00e7\u00bb\u00bc\u00e8\u00bf\u00b0\u00ef\u00bc\u008c\u00e5\u008b\u00be\u00e5\u008b\u0092\u00e4\u00ba\u0086\u00e4\u00b8\u0096\u00e7\u0095\u008c\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e7\u009a\u0084\u00e6\u00bc\u0094\u00e8\u00bf\u009b\u00e8\u0093\u009d\u00e5\u009b\u00be\u00ef\u00bc\u008c\u00e4\u00bd\u0086\u00e5\u00b9\u00b6\u00e6\u009c\u00aa\u00e6\u008f\u0090\u00e4\u00be\u009b\u00e5\u008f\u00af\u00e5\u00a4\u008d\u00e7\u008e\u00b0\u00e7\u009a\u0084\u00e8\u00ae\u00ad\u00e7\u00bb\u0083\u00e5\u008d\u008f\u00e8\u00ae\u00ae\u00e6\u0088\u0096\u00e6\u0098\u00be\u00e5\u00bc\u008f\u00e4\u00bc\u0098\u00e5\u008c\u0096\u00e5\u00b1\u0080\u00e9\u0099\u0090\u00e5\u009c\u00a8\u00e4\u00ba\u008e\u00ef\u00bc\u009a\u00e4\u00bb\u008e\u00e5\u008d\u0095\u00e6\u00ad\u00a5\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e5\u0088\u00b0\u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e7\u009a\u0084\u00e8\u00b7\u00a8\u00e8\u00b6\u008a\u00e4\u00b8\u00ad\u00ef\u00bc\u008c\u00e6\u00a8\u00a1\u00e5\u009e\u008b\u00e4\u00bb\u008d\u00e6\u00b7\u00b1\u00e9\u0099\u00b7\u00e2\u0080\u009c\u00e4\u00b8\u008a\u00e4\u00b8\u008b\u00e6\u0096\u0087\u00e9\u0081\u0097\u00e5\u00bf\u0098\u00e2\u0080\u009d\u00e4\u00b8\u008e\u00e2\u0080\u009c\u00e8\u00ae\u00a1\u00e7\u00ae\u0097\u00e5\u009d\u008d\u00e7\u00bc\u00a9\u00e2\u0080\u009d\u00e7\u009a\u0084\u00e6\u00b3\u00a5\u00e6\u00b2\u00bc\u00ef\u00bc\u008c\u00e4\u00b8\u0094\u00e5\u009c\u00a8\u00e5\u00a4\u009a\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e6\u00b6\u008c\u00e7\u008e\u00b0\u00e5\u008a\u00a8\u00e6\u0080\u0081\u00e4\u00b8\u008b\u00e7\u009a\u0084\u00e5\u00af\u00b9\u00e9\u00bd\u0090\u00e9\u0097\u00ae\u00e9\u00a2\u0098\u00e5\u00b0\u009a\u00e6\u0097\u00a0\n- **\u00e5\u00b1\u0095\u00e5\u00bc\u00801\u00ef\u00bc\u009a\u00e4\u00ba\u00a4\u00e4\u00ba\u0092\u00e4\u00b8\u008e\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e7\u009a\u0084\u00e5\u00a4\u00b1\u00e6\u0095\u0088\u00e6\u00a8\u00a1\u00e5\u00bc\u008f\u00ef\u00bc\u0088Stage II & III\u00ef\u00bc\u0089**\n  - Stage II \u00e7\u00bc\u00ba\u00e4\u00b9\u008f continuous, real-time closed-loop interaction\u00ef\u00bc\u008c\u00e5\u00a4\u009a\u00e4\u00b8\u00ba single-shot synthesis\u00e3\u0080\u0082\n  - Stage III \u00e8\u0099\u00bd\u00e6\u009c\u0089 real-time interaction\u00ef\u00bc\u008c\u00e4\u00bd\u0086 implicit frame-by-frame generators \u00e5\u00ae\u00b9\u00e6\u0098\u0093 losing context \u00e5\u0092\u008c hallucinating objects\u00e3\u0080\u0082explicit 3D approaches \u00e8\u0099\u00bd\u00e7\u00a9\u00ba\u00e9\u0097\u00b4\u00e4\u00b8\u0080\u00e8\u0087\u00b4\u00e6\u0080\u00a7\u00e5\u00bc\u00ba\u00ef\u00bc\u008c\u00e4\u00bd\u0086\u00e5\u009c\u00a8 dynamic elements \u00e5\u0092\u008c long-term object states \u00e4\u00b8\u008a\u00e6\u008c\u00a3\u00e6\u0089\u008e\u00e3\u0080\u0082\n  - \u00e5\u009b\u00be\u00e8\u00a1\u00a8\u00ef\u00bc\u009aMermaid flowchart \u00e5\u00b1\u0095\u00e7\u00a4\u00ba\u00e4\u00b8\u008d\u00e5\u0090\u008c\u00e9\u0098\u00b6\u00e6\u00ae\u00b5\u00e7\u0094\u009f\u00e6\u0088\u0090\u00e6\u0096\u00b9\u00e6\u00b3\u0095\u00e7\u009a\u0084\u00e5\u00a4\u00b1\u00e6\u0095\u0088\u00e5\u0088\u0086\u00e6\u0094\u00af\u00e3\u0080\u0082\n- **\u00e5\u00b1\u0095\u00e5\u00bc\u00802\u00ef\u00bc\u009a\u00e9\u0095\u00bf\u00e7\u00a8\u008b\u00e8\u00ae\u00b0\u00e5\u00bf\u0086\u00e4\u00b8\u008e\u00e8\u00ae\u00a1\u00e7\u00ae\u0097\u00e5\u009d\u008d\u00e7\u00bc\u00a9\u00ef\u00bc\u0088Stage IV & True World Model\u00ef\u00bc\u0089**\n  - mask-based persistent memory \u00e6\u008e\u00a2\u00e7\u00b4\u00a2\u00e4\u00b8\u008d\u00e8\u00b6\u00b3\u00ef\u00bc\u008cStage IV \u00e6\u0098\u00af architecture-agnostic view\u00e3\u0080\u0082\n  - ever-growing history \u00e5\u00af\u00bc\u00e8\u0087\u00b4 computational collapse\u00e3\u0080\u0082\u00e9\u009c\u0080\u00e8\u00a6\u0081 causally sufficient state abstractions\u00ef\u00bc\u008c\u00e4\u00bd\u0086 long-horizon dynamics \u00e5\u008f\u00af\u00e8\u0083\u00bd computationally irreducible\u00e3\u0080\u0082\n  - \u00e6\u008e\u00a2\u00e8\u00ae\u00a8 Coherence, Compression, Alignment \u00e4\u00b8\u0089\u00e5\u00a4\u00a7\u00e9\u0097\u00ae\u00e9\u00a2\u0098\u00e3\u0080\u0082\n- **\u00e5\u00b1\u0095\u00e5\u00bc\u00803\u00ef\u00bc\u009a\u00e5\u00a4\u009a\u00e6\u0099\u00ba\u00e8\u0083\u00bd\u00e4\u00bd\u0093\u00e7\u00a4\u00be\u00e4\u00bc\u009a\u00e7\u009a\u0084\u00e5\u00af\u00b9\u00e9\u00bd\u0090\u00e5\u009b\u00b0\u00e5\u00a2\u0083**\n  - alignment \u00e5\u009c\u00a8 multi-agent society \u00e4\u00b8\u00ad\u00e6\u009b\u00b4\u00e9\u009a\u00be\u00ef\u00bc\u008c\u00e9\u009c\u0080\u00e5\u00af\u00b9\u00e9\u00bd\u0090 substrate \u00e4\u00b8\u008e emergent dynamics\u00e3\u0080\u0082\n\n\u00e8\u008d\u0089\u00e6\u008b\u0
