# config/llm.yaml — per-seam LLM routing + execution mode.
#
# OPTIONAL: delete this file to route EVERY seam to the bottom-line default `claude -p`.
# The engine itself is provider-agnostic; ALL transport choices live here.

# ----------------------------------------------------------------------------
# providers: name -> spec. Two provider TYPES (NEITHER is bound to any vendor):
#   claude_code       : headless `claude -p` (your Claude Code auth; supports
#                       --effort and grounded Read/Grep). This is the bottom-line
#                       DEFAULT + the mandatory fallback for every seam.
#   openai_compatible : ANY OpenAI chat-completions API behind an API TOKEN —
#                       described purely by {base_url, models, api_key_env}. This
#                       is the generic "API-token provider"; the instances below
#                       (opencode / deepseek-official / openrouter / …) are just
#                       config, NOT code. Swap or add vendors freely; nothing in
#                       the engine knows any vendor name.
#
# The api_key_env value names an env var read from .env (gitignored) — keys are
# NEVER hard-coded. Each instance carries its own token env.
# ----------------------------------------------------------------------------
providers:
  claude-code:                       # bottom-line default + fallback (must exist)
    type: claude_code
    strong_model: claude-sonnet-4-6
    fast_model: claude-haiku-4-5-20251001

  # --- API-token providers (any OpenAI-compatible endpoint) -------------------
  opencode:                          # OpenCode "Zen/Go" gateway
    type: openai_compatible
    base_url: https://opencode.ai/zen/go/v1
    api_key_env: OPENCODE_API_KEY
    strong_model: deepseek-v4-pro
    fast_model: deepseek-v4-flash
    # send_reasoning_effort: false   # set true only if the backend accepts OpenAI reasoning_effort

  hellorobotaxi:                     # 公司内网 API-Hub (OpenAI 兼容) — Clash DIRECT 直连
    type: openai_compatible
    base_url: https://api-hub.hellorobotaxi.top/v1
    api_key_env: HELLOROBOTAXI_API_KEY
    strong_model: qwen3.7-max        # tier=strong 的 seam 用 (writer)
    fast_model: qwen3.7-plus         # tier=fast 的 seam 用 (skeptic/entailment/expand)
    no_proxy: true                   # 内网平台必须绕开 env 代理直连 (否则 TLS 被代理链掐断)

  # Ready-to-use alternatives — uncomment + set the key env in .env to switch.
  # NOT bound to opencode: same code path, different base_url + token.
  # deepseek-official:               # DeepSeek's own API
  #   type: openai_compatible
  #   base_url: https://api.deepseek.com/v1
  #   api_key_env: DEEPSEEK_API_KEY
  #   strong_model: deepseek-reasoner
  #   fast_model: deepseek-chat
  # openrouter:                      # OpenRouter (multi-model gateway)
  #   type: openai_compatible
  #   base_url: https://openrouter.ai/api/v1
  #   api_key_env: OPENROUTER_API_KEY
  #   strong_model: deepseek/deepseek-chat
  #   fast_model: deepseek/deepseek-chat

# ----------------------------------------------------------------------------
# seams: which provider + execution mode runs each LLM seam.
#   value = a provider name (default mode), or {provider, mode}.
#   mode  = inline | grounded(claude-code reads files itself) | agent_team(opt-in).
# EVERY seam is independently routable; every call falls back to claude-code, and
# if that bottom line ALSO fails the engine aborts (EngineAbort) — no silent
# degradation.
#
# FUTURE (cross-audit, not yet active): a seam value may become a LIST of
# providers for high-variance-but-critical seams (analyzer / writer) — each holds
# the task independently and the main process judges + cherry-picks. The single
# value below is the v1 form; the routing schema is shaped to grow into a list.
# ----------------------------------------------------------------------------
seams:
  analyzer: { provider: claude-code, mode: grounded }   # heaviest + most critical SSOT; grounded = claude -p reads MD itself, chunked-parallel
  skeptic: hellorobotaxi       # G2 number-fidelity (tier=fast → qwen3.7-plus)
  rigor: hellorobotaxi         # G3 6-dim rigor (tier=strong → qwen3.7-max);analyzer 仍 claude-code,审计跨模型不破
  entailment: hellorobotaxi    # G3 entailment — tiny in/out (tier=fast → qwen3.7-plus)
  expand: hellorobotaxi        # discovery query expansion (tier=fast → qwen3.7-plus)
  writer: hellorobotaxi        # human chain (tier=strong → qwen3.7-max)
