# config/llm.yaml — per-seam LLM routing + execution mode.
#
# REQUIRED: this file MUST exist and EVERY seam MUST be explicitly routed. There
# is NO default to `claude -p` and NO fallback — a missing file, an unrouted seam,
# or a failing provider is a hard, loud error (EngineAbort). The Claude Code
# subscription is used ONLY when a seam is deliberately routed to claude-code.
# The engine itself is provider-agnostic; ALL transport choices live here.

# ----------------------------------------------------------------------------
# providers: name -> spec. Four provider TYPES (NONE is bound to any vendor):
#   claude_code       : headless `claude -p` (Claude Code subscription auth;
#                       --effort + grounded Read/Grep). A LOCAL agent. Models MUST
#                       be specified explicitly — there is NO default model.
#   codex_cli         : headless `codex exec` (Codex/ChatGPT login, no API key;
#                       no-sandbox so it reads files itself). Also a LOCAL agent.
#                       `model` is optional (empty => codex CLI default).
#   openai_compatible : ANY OpenAI chat-completions API behind an API TOKEN —
#                       described purely by {base_url, models, api_key_env}. The
#                       instances below (opencode / hellorobotaxi / …) are config,
#                       NOT code. NOT grounded (no local file access).
#   round_robin       : a COMPOSITE that alternates calls across its `members`
#                       (other providers), so each member's own cap runs in
#                       parallel. Grounded only if EVERY member is grounded.
#
# CONCURRENCY is PER-PROVIDER: each leaf provider may set `max_concurrent` (its
# own in-flight cap / semaphore). A generous backend runs wide (e.g. 10); a
# token-expensive one narrow (e.g. 3). Omitted => 5 for agents, 8 for HTTP. A
# round_robin needs no cap — each member self-limits, so the pool's total is the
# SUM of its members' caps (claude 5 + codex 5 = 10-wide).
#
# GROUNDED is a per-type CAPABILITY (local agents only), not inferred from config:
# a `mode: grounded` seam may route only to a grounded-capable provider (a local
# agent, or a pool whose every member is one).
#
# The api_key_env value names an env var read from .env (gitignored) — keys are
# NEVER hard-coded. Each instance carries its own token env.
# ----------------------------------------------------------------------------
providers:
  claude-code:                       # local agent; only seams explicitly routed here use the Claude sub
    type: claude_code
    strong_model: claude-sonnet-4-6
    fast_model: claude-haiku-4-5-20251001
    max_concurrent: 3                # GENTLE (2026-06-12 overnight): 5-wide hit the rate-limit (exit 1); 3-wide grinds steadier

  # --- Local agent providers (grounded-capable; subscription auth, no API key) ---
  codex:                             # headless `codex exec` (Codex/ChatGPT login); model unset => CLI default
    type: codex_cli
    reasoning_effort: medium         # STEP2 (2026-06-12): 全局默认是 xhigh(150-366s/chunk!)→ medium 提速+稳定,只作用于本 analyzer
    max_concurrent: 5                # medium 下并行跑 5 chunk
    # model: gpt-5.3-codex            # optional: pin a model; empty => codex CLI default

  analyzer-pool:                     # round-robin claude-code <-> codex for the grounded analyzer
    type: round_robin                # alternates backends; total = sum of member caps → 5 claude + 5 codex = 10-wide
    members: [claude-code, codex]

  # --- API-token providers (any OpenAI-compatible endpoint) -------------------
  opencode:                          # OpenCode "Zen/Go" gateway
    type: openai_compatible
    base_url: https://opencode.ai/zen/go/v1
    api_key_env: OPENCODE_API_KEY
    strong_model: deepseek-v4-pro
    fast_model: deepseek-v4-flash
    max_concurrent: 8                # this instance's own in-flight HTTP cap
    # send_reasoning_effort: false   # set true only if the backend accepts OpenAI reasoning_effort

  hellorobotaxi:                     # 公司内网 API-Hub (OpenAI 兼容) — Clash DIRECT 直连
    type: openai_compatible
    base_url: https://api-hub.hellorobotaxi.top/v1
    api_key_env: HELLOROBOTAXI_API_KEY
    strong_model: qwen3.7-max        # tier=strong 的 seam 用 (rigor)
    fast_model: qwen3.7-plus         # tier=fast 的 seam 用 (skeptic/entailment/expand)
    no_proxy: true                   # 内网平台必须绕开 env 代理直连 (否则 TLS 被代理链掐断)
    max_concurrent: 8                # gates(skeptic/rigor/entailment) 的并发上限,独立于 analyzer

  hellorobotaxi-writer:              # 人链 writer 专用:qwen3.6-plus(与 rigor 的 qwen3.7-max 隔离;2026-06-13)
    type: openai_compatible          # 同一内网 Hub,只换写手模型
    base_url: https://api-hub.hellorobotaxi.top/v1
    api_key_env: HELLOROBOTAXI_API_KEY
    strong_model: qwen3.6-plus       # writer 走 tier=strong → 此模型
    fast_model: qwen3.6-plus
    no_proxy: true
    max_concurrent: 8

  # Ready-to-use alternatives — uncomment + set the key env in .env to switch.
  # NOT bound to opencode: same code path, different base_url + token.
  # deepseek-official:               # DeepSeek's own API
  #   type: openai_compatible
  #   base_url: https://api.deepseek.com/v1
  #   api_key_env: DEEPSEEK_API_KEY
  #   strong_model: deepseek-reasoner
  #   fast_model: deepseek-chat
  # openrouter:                      # OpenRouter (multi-model gateway)
  #   type: openai_compatible
  #   base_url: https://openrouter.ai/api/v1
  #   api_key_env: OPENROUTER_API_KEY
  #   strong_model: deepseek/deepseek-chat
  #   fast_model: deepseek/deepseek-chat

# ----------------------------------------------------------------------------
# seams: which provider + execution mode runs each LLM seam.
#   value = a provider name (mode defaults), or {provider, mode}.
#   mode  = inline | grounded(a local agent reads the source files itself) | agent_team(opt-in).
# EVERY seam MUST be explicitly routed (no default provider). On provider failure
# the engine aborts LOUDLY (EngineAbort) — there is NO fallback, so a bad key /
# endpoint surfaces instead of silently draining the Claude Code subscription.
#
# FUTURE (cross-audit, not yet active): a seam value may become a LIST of
# providers for high-variance-but-critical seams (analyzer / writer) — each holds
# the task independently and the main process judges + cherry-picks. The single
# value below is the v1 form; the routing schema is shaped to grow into a list.
# ----------------------------------------------------------------------------
# Each seam routes to a provider AND pins its LLM-call knobs HERE: tier (strong|fast → the
# provider's strong_model|fast_model), effort, timeout. This master config owns those knobs
# so a model/effort/timeout change never needs a code edit; the seam code carries only a
# fallback default. (analyzer's tier applies to its chunk calls; the writer's tier applies
# to the report SECTIONS — figure-curation stays fast internally, a trivial classification,
# not a "writer model" choice. tier is a no-op for providers with a single model, e.g. the
# codex_cli analyzer ignores it until analyzer routes to a tiered provider/pool.)
seams:
  analyzer: { provider: codex, mode: grounded, tier: strong }  # codex-only this round (2026-06-12): verify codex solo before re-enabling the analyzer-pool (codex ignores tier; honored if routed to a tiered provider)
  skeptic: { provider: hellorobotaxi, tier: fast }       # G2 number-fidelity (fast → qwen3.7-plus)
  rigor: { provider: hellorobotaxi, tier: strong }       # G3 6-dim rigor (strong → qwen3.7-max)
  entailment: { provider: hellorobotaxi, tier: fast }    # G3 entailment — tiny in/out (fast → qwen3.7-plus)
  expand: { provider: hellorobotaxi, tier: fast }        # discovery query expansion (fast → qwen3.7-plus)
  writer: { provider: hellorobotaxi-writer, tier: strong }  # human chain SECTIONS (strong → qwen3.6-plus); figure-curation stays fast in-module
  faithfulness: { provider: claude-code, tier: fast }    # ADR-0012 忠实门 judge → claude-code fast = claude-haiku-4-5
  # OPTIONAL seam (T4 长尾码链发现,repo_resolve)。本地 claude-code 派子 agent 用 WebSearch 工具联网搜 +
  # 自行研判(官方/忠实复现/无关),只背书确信的仓库。tier=strong → claude-sonnet-4-6(判断任务,非 haiku:
  # haiku 会做松散判断);effort/timeout 也在此配。只在 PwC/正文/HF 全空时才触发(长尾才联网);fail-soft:
  # 失败→[],绝不拖垮 tick。换后端/档位/token 直接改这里(去掉本条 = T4 关)。
  web_search: { provider: claude-code, tier: strong, effort: high, timeout: 420 }
